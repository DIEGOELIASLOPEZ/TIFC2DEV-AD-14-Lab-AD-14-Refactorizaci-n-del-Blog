  <html>

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>replit</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>


  <script src="script.js"></script>


  <!-- Contenido -->
  <section class="contenido">
    <div class="container text-center">
      <div class="row">
        <div class="col-2">
          ADD
        </div>
        <div class="col-8">
          <div class="container mt-5">
            <div class="card">
              <div class="card-header">
                Contáctanos
              </div>
              <div class="card-body">
                <form>
                  <!-- Nombre usuario -->
                  <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre</label>
                    <input type="text" class="form-control" id="nombre" placeholder="Ingresa tu nombre" required>
                  </div>

                  <!-- Correo electronico-->
                  <div class="mb-3">
                    <label for="correo" class="form-label">Correo electrónico</label>
                    <input type="email" class="form-control" id="correo" placeholder="Ingresa un email" required>
                  </div>

                  <!-- Telefono-->
                  <div class="mb-3">
                    <label for="telefono" class="form-label">Teléfono</label>
                    <input type="tel" class="form-control" id="telefono" placeholder="Ingresa tu número de teléfono"
                      required>
                  </div>

                  <!-- Comentarios adicionales -->
                  <div class="mb-3">
                    <label for="comentarios" class="form-label">Comentarios o sugerencias</label>
                    <textarea class="form-control" id="comentarios" rows="3" placeholder="Escribe tu mensaje..."
                      required></textarea>
                  </div>

                  <!-- Checkbox -->
                  <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="terminos" required>
                    <label class="form-check-label" for="terminos">Acepto términos y condiciones</label>
                  </div>

                  <!-- Botón de enviar comentarios o sugerencias-->
                  <button type="submit" class="btn btn-primary">Enviar</button>
                </form>
              </div>
            </div>
          </div>
        </div>
        <div class="col-2">
          News
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <p>Footer</p>
  </footer>
